<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Викторина: Работа с текстом</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-btn {
            transition: all 0.2s;
        }
        .option-btn:hover {
            transform: translateY(-2px);
        }
        .option-btn:disabled {
            cursor: default;
            transform: none;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans">

    <div id="quiz-container" class="bg-white rounded-2xl shadow-xl p-6 md:p-8 w-full max-w-2xl">
        <!-- Progress Bar -->
        <div class="mb-6">
            <div class="flex justify-between text-sm text-slate-500 mb-2">
                <span id="progress-text">Вопрос 1 из 10</span>
                <span id="score-text">Счет: 0</span>
            </div>
            <div class="w-full bg-slate-200 h-2 rounded-full">
                <div id="progress-bar" class="bg-blue-500 h-2 rounded-full transition-all duration-300" style="width: 10%"></div>
            </div>
        </div>

        <!-- Question Section -->
        <div id="question-content" class="space-y-6">
            <h2 id="question-title" class="text-xl font-bold text-slate-800 text-center">Подготовка вопросов...</h2>
            
            <div id="image-container" class="flex justify-center bg-slate-100 rounded-xl p-4 overflow-hidden min-h-[150px] items-center">
                <!-- Image will be injected here -->
            </div>

            <div id="options-grid" class="grid grid-cols-1 gap-3">
                <!-- Options will be injected here -->
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden text-center space-y-6 py-8">
            <div class="text-6xl">🎉</div>
            <h2 class="text-3xl font-bold text-slate-800">Викторина завершена!</h2>
            <p id="final-score" class="text-xl text-slate-600 font-medium"></p>
            <button onclick="window.location.href='txt.html';" class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold hover:bg-blue-700 transition shadow-lg">Пройти еще раз</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                title: "Что делает человек на данной фотографии?",
                image: "1 pic.png",
                options: ["Удаляет текст", "Выделяет текст", "Копирует текст", "Меняет шрифт"],
                correct: 1
            },
            {
                title: "Что делает человек на данной фотографии?",
                image: "2 pic.png",
                options: ["Выделяет весь текст", "Сохраняет документ", "Удаляет и исправляет текст", "Вставляет картинку"],
                correct: 2
            },
            {
                title: "Что делает эта комбинация кнопок?",
                image: "3 pic.png",
                options: ["Выделяет весь текст", "Закрывает программу", "Отменяет действие", "Печатает страницу"],
                correct: 0
            },
            {
                title: "Что делает эта кнопка (Пробел)?",
                image: "4 pic.png",
                options: ["Переходит на новую строку", "Создает пустое поле между словами", "Удаляет символ справа", "Делает текст жирным"],
                correct: 1
            },
            {
                title: "Что делает эта кнопка (Caps Lock)?",
                image: "5 pic.png",
                options: ["Удаляет весь текст", "Меняет язык ввода", "Печатает заглавными буквами", "Включает цифровую клавиатуру"],
                correct: 2
            },
            {
                title: "Что изображено на рисунке?",
                image: "11pic.png",
                options: ["Копировать", "Вставить", "Вырезать", "Удалить"],
                correct: 2
            },
            {
                title: "Что изображено на рисунке?",
                image: "12pic.png",
                options: ["Сохранить", "Копировать", "Распечатать", "Вырезать"],
                correct: 1
            },
            {
                title: "Что изображено на рисунке?",
                image: "13pic.png",
                options: ["Вставить", "Открыть", "Создать", "Поделиться"],
                correct: 0
            },
            {
                title: "Как запустить WordPad?",
                image: "14pic.jpg",
                options: [
                    "Правой кнопкой на рабочем столе",
                    "Пуск - Стандартные Windows - WordPad",
                    "Нажать кнопку Esc 5 раз",
                    "Через калькулятор"
                ],
                correct: 1
            },
            {
                title: "Что такое WordPad?",
                image: "14pic.jpg",
                options: [
                    "Графический редактор",
                    "Текстовый редактор",
                    "Антивирусная программа",
                    "Браузер"
                ],
                correct: 1
            }
        ];

        let currentQuestion = 0;
        let score = 0;

        function loadQuestion() {
            const q = questions[currentQuestion];
            const progressText = document.getElementById('progress-text');
            const progressBar = document.getElementById('progress-bar');
            const scoreText = document.getElementById('score-text');
            const questionTitle = document.getElementById('question-title');
            const imgContainer = document.getElementById('image-container');
            const optionsGrid = document.getElementById('options-grid');

            if (!q) return;

            progressText.innerText = `Вопрос ${currentQuestion + 1} из ${questions.length}`;
            progressBar.style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;
            scoreText.innerText = `Счет: ${score}`;
            questionTitle.innerText = q.title;

            if (q.image) {
                imgContainer.innerHTML = `<img src="${q.image}" alt="Иллюстрация" class="max-h-48 rounded shadow-sm object-contain" onerror="this.src='https://via.placeholder.com/400x200?text=Изображение+не+найдено'">`;
            } else if (q.svg) {
                imgContainer.innerHTML = q.svg;
            }

            optionsGrid.innerHTML = '';
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full p-4 text-left border-2 border-slate-200 rounded-xl hover:border-blue-500 hover:bg-blue-50 font-medium text-slate-700';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index);
                optionsGrid.appendChild(btn);
            });
        }

        function checkAnswer(index) {
            const q = questions[currentQuestion];
            const btns = document.querySelectorAll('.option-btn');
            
            btns.forEach(btn => btn.disabled = true);

            if (index === q.correct) {
                btns[index].classList.remove('border-slate-200');
                btns[index].classList.add('border-green-500', 'bg-green-50', 'text-green-700');
                score++;
            } else {
                btns[index].classList.remove('border-slate-200');
                btns[index].classList.add('border-red-500', 'bg-red-50', 'text-red-700');
                btns[q.correct].classList.add('border-green-500', 'bg-green-50');
            }

            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < questions.length) {
                    loadQuestion();
                } else {
                    showResults();
                }
            }, 1200);
        }

        function showResults() {
            document.getElementById('question-content').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = `Вы ответили правильно на ${score} из ${questions.length} вопросов`;
        }

        // Запуск викторины строго после загрузки всего HTML
        window.onload = function() {
            loadQuestion();
        };
    </script>
</body>
</html>
